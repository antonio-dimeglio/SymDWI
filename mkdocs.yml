site_name: SymDWI
site_description: Synthetic diffusion MRI phantom library

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference:
    - Bundle: api/bundle.md
    - Simulate: api/simulate.md
    - GM Compartments: api/gm_compartments.md
  - Examples:
    - Basic Phantom: examples/basic_phantom.md
    - BundleSeg Full-Brain: examples/bundleseg_phantom.md